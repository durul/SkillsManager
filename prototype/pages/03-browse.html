<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillsManager — 3. Browse & Discover</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/tokens.css">
<link rel="stylesheet" href="../components/layout.css">
<link rel="stylesheet" href="../components/buttons.css">
<link rel="stylesheet" href="../components/sidebar.css">
<link rel="stylesheet" href="../components/skill-card.css">
<link rel="stylesheet" href="../components/detail-panel.css">
<link rel="stylesheet" href="../components/modal.css">
</head>
<body>

<div class="app detail-open" id="app-root"></div>

<script src="../components/icons.js"></script>
<script src="../components/app-shell.js"></script>
<script>
// ===== JOURNEY 3: Browse & Discover =====
// User has installed skills. Browsing local catalog. Select a skill to see detail.

function renderPage() {
  const sidebar = renderSidebar({ activeNav: 'all-installed' });

  const main = `
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">All Installed Skills</div>
          <div class="topbar-subtitle">12 skills across 2 providers</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="active" title="Grid view">${Icons.gridView}</button>
          <button title="List view">${Icons.listView}</button>
        </div>
        <button class="btn-icon" title="Refresh">${Icons.refresh}</button>
      </div>
    </div>

    <div class="category-tabs">
      <div class="category-tab active" onclick="selectTab(this)">All <span style="color:var(--text-muted);font-size:10px;">12</span></div>
      <div class="category-tab" onclick="selectTab(this)">development <span style="color:var(--text-muted);font-size:10px;">5</span></div>
      <div class="category-tab" onclick="selectTab(this)">design <span style="color:var(--text-muted);font-size:10px;">2</span></div>
      <div class="category-tab" onclick="selectTab(this)">testing <span style="color:var(--text-muted);font-size:10px;">2</span></div>
      <div class="category-tab" onclick="selectTab(this)">ai <span style="color:var(--text-muted);font-size:10px;">2</span></div>
      <div class="category-tab" onclick="selectTab(this)">devops <span style="color:var(--text-muted);font-size:10px;">1</span></div>
    </div>

    <div style="padding-top:16px;">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-icon blue">${Icons.book}</div>
          <div><div class="stat-value">38</div><div class="stat-label">Total Skills</div></div>
        </div>
        <div class="stat">
          <div class="stat-icon green">${Icons.check}</div>
          <div><div class="stat-value">12</div><div class="stat-label">Installed</div></div>
        </div>
        <div class="stat">
          <div class="stat-icon purple">${Icons.github}</div>
          <div><div class="stat-value">3</div><div class="stat-label">Catalogs</div></div>
        </div>
      </div>
    </div>

    <div class="content-area">
      <div class="skills-grid">
        ${skillCard('Swift Concurrency', 'Expert guidance on async/await, actors, Sendable, and Swift 6 migration.', '2.1.0', ['development','swift'], true, ['claude','codex'], 0, 0, true)}
        ${skillCard('UI/UX Pro Max', '50+ design styles, 97 color palettes, and UX guidelines.', '1.5.0', ['design','ui'], true, ['claude'], 3, 2)}
        ${skillCard('TDD Chicago School', 'State-based TDD with emergent design. Chicago School principles.', '1.0.0', ['testing','tdd'], true, ['claude'])}
        ${skillCard('Feature Development', 'Guided feature dev with codebase understanding and code review.', '3.0.0', ['development'], true, ['claude','codex'])}
        ${skillCard('Claude API', 'Build apps with Claude API and Anthropic SDK. Tool use, agents.', '2.0.0', ['ai','api'], true, ['claude'], 5)}
        ${skillCard('Xcode Cloud CI/CD', 'Manage Xcode Cloud workflows, trigger builds, check status.', '1.2.0', ['devops','ci'], true, ['claude'])}
      </div>
    </div>
  </main>`;

  const detail = `
  <aside class="detail-panel">
    <div class="detail-panel-header">
      <div>
        <div class="detail-name">Swift Concurrency</div>
        <div class="detail-source">${Icons.github} Anthropic Skills</div>
      </div>
      <button class="detail-close">${Icons.close}</button>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-title">Description</div>
        <div class="detail-desc">Expert guidance on Swift Concurrency best practices, patterns, and implementation. Covers async/await, actors, Sendable, @MainActor, and Swift 6 migration.</div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Tags</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span class="tag tag-category">development</span>
          <span class="tag tag-category">swift</span>
          <span class="tag tag-category">concurrency</span>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Metadata</div>
        <div class="detail-meta-grid">
          <div class="detail-meta-item"><div class="detail-meta-label">Version</div><div class="detail-meta-value">2.1.0</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">References</div><div class="detail-meta-value">3 files</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">Scripts</div><div class="detail-meta-value">1 file</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">Source</div><div class="detail-meta-value" style="font-size:11px;">GitHub</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Storage</div>
        <div style="padding:8px 12px;background:var(--bg-input);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:10px;">
          <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;">Installed at</div>
          <div style="font-size:12px;font-family:var(--font-mono);">~/.agent/skills/swift-concurrency/</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Linked Providers</div>
        <div class="provider-cards">
          <div class="provider-card installed">
            <div class="provider-icon claude">C</div>
            <div class="provider-info"><div class="provider-name">Claude Code</div><div class="provider-path">~/.claude/skills/ &larr; symlink</div></div>
            <span class="provider-status installed">Linked</span>
          </div>
          <div class="provider-card installed">
            <div class="provider-icon codex">X</div>
            <div class="provider-info"><div class="provider-name">Codex</div><div class="provider-path">~/.codex/skills/ &larr; symlink</div></div>
            <span class="provider-status installed">Linked</span>
          </div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Content Preview</div>
        <div class="detail-content-preview">
          <h3>When to Use</h3>
          <p>Trigger when developers mention <code>async/await</code>, <code>actors</code>, <code>@MainActor</code>, or <code>Sendable</code>.</p>
          <h3>Key Patterns</h3>
          <p>Structured concurrency with <code>TaskGroup</code>, actor isolation, <code>AsyncSequence</code>.</p>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-danger">${Icons.trash} Uninstall</button>
      <button class="btn btn-secondary">${Icons.folder} Finder</button>
      <button class="btn btn-primary" disabled>${Icons.check} All Linked</button>
    </div>
  </aside>`;

  document.getElementById('app-root').innerHTML = sidebar + main + detail;
  document.body.insertAdjacentHTML('beforeend', renderAddCatalogModal());
  document.body.insertAdjacentHTML('beforeend', renderPageNav('03-browse'));
}

function skillCard(name, desc, version, tags, installed, providers=[], refs=0, scripts=0, selected=false) {
  const dot = installed ? '<span class="dot"></span>' : '';
  const tagHtml = tags.map(t => `<span class="tag tag-category">${t}</span>`).join('');
  const provHtml = (providers||[]).map(p => `<span class="tag tag-${p}">${p==='claude'?'Claude Code':'Codex'}</span>`).join('');
  const refTag = refs ? `<span class="tag tag-refs">${refs} refs</span>` : '';
  const scriptTag = scripts ? `<span class="tag tag-scripts">${scripts} scripts</span>` : '';
  return `
  <div class="skill-card${selected?' selected':''}" onclick="selectCard(this)">
    <div class="skill-card-header">
      <div class="skill-card-name">${dot}${name}</div>
      <div class="skill-card-actions">
        <button class="btn-icon" title="Install">${Icons.download}</button>
      </div>
    </div>
    <div class="skill-card-desc">${desc}</div>
    <div class="skill-card-meta">
      <span class="tag tag-version">v${version}</span>
      ${tagHtml}${provHtml}${refTag}${scriptTag}
    </div>
  </div>`;
}

renderPage();
</script>
</body>
</html>
