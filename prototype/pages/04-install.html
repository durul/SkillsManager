<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillsManager — 4. Install Skill</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/tokens.css">
<link rel="stylesheet" href="../components/layout.css">
<link rel="stylesheet" href="../components/buttons.css">
<link rel="stylesheet" href="../components/sidebar.css">
<link rel="stylesheet" href="../components/skill-card.css">
<link rel="stylesheet" href="../components/detail-panel.css">
<link rel="stylesheet" href="../components/modal.css">
<style>
/* Install modal */
.install-modal .provider-card { position: relative; }
.install-modal .provider-card .checkbox {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.install-modal .provider-card.checked .checkbox {
  background: var(--accent); border-color: var(--accent);
}
.install-modal .provider-card.checked .checkbox svg { width: 12px; height: 12px; color: white; }

/* Path display */
.install-path {
  padding: 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.install-path-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.install-path-value {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-primary);
}
.install-link-section {
  margin-top: 16px;
}
.install-link-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.install-link-label svg { width: 12px; height: 12px; }
.link-arrow {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  padding: 4px 0 4px 48px;
}

/* Progress */
.install-progress { text-align: center; padding: 24px; }
.install-progress .spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.install-success { text-align: center; padding: 24px; }
.install-success .check-circle {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--green-subtle);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
}
.install-success .check-circle svg { width: 24px; height: 24px; color: var(--green); }

/* Provider link status in detail */
.link-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 10px;
}
.link-status.linked { background: var(--green-subtle); color: var(--green); }
.link-status.unlinked { background: var(--bg-input); color: var(--text-muted); }
.link-status svg { width: 10px; height: 10px; }
</style>
</head>
<body>

<div class="app detail-open" id="app-root"></div>

<script src="../components/icons.js"></script>
<script src="../components/app-shell.js"></script>
<script>
// SVGs with explicit sizes
const checkSm = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';
const linkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
const dlSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

function renderPage() {
  const sidebar = renderSidebar({ activeNav: 'anthropic' });

  const main = `
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">Anthropic Skills</div>
          <div class="topbar-subtitle">24 skills &mdash; github.com/anthropics/skills</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="active">${Icons.gridView}</button>
          <button>${Icons.listView}</button>
        </div>
        <button class="btn-icon" title="Refresh">${Icons.refresh}</button>
      </div>
    </div>

    <div class="category-tabs">
      <div class="category-tab active" onclick="selectTab(this)">All</div>
      <div class="category-tab" onclick="selectTab(this)">development</div>
      <div class="category-tab" onclick="selectTab(this)">design</div>
      <div class="category-tab" onclick="selectTab(this)">devops</div>
    </div>

    <div class="content-area">
      <div class="skills-grid">
        ${card('SwiftUI Expert', 'State management, view composition, iOS 26+ Liquid Glass.', '1.3.0', ['development','swift'], true)}
        ${card('Xcode Cloud CI/CD', 'Manage Xcode Cloud workflows, trigger builds.', '1.2.0', ['devops','ci'])}
        ${card('App Store Changelog', 'Generate release notes from git history and tags.', '1.0.0', ['documentation'])}
        ${card('iOS App Scaffold', 'Scaffold iOS apps with Tuist and layered architecture.', '2.0.0', ['development'])}
        ${card('App Localization', 'iOS/macOS localization management.', '1.1.0', ['development'])}
        ${card('Remotion Video', 'Best practices for React video creation.', '1.0.0', ['design'])}
      </div>
    </div>
  </main>`;

  // Detail panel - NOT INSTALLED yet
  const detail = `
  <aside class="detail-panel">
    <div class="detail-panel-header">
      <div>
        <div class="detail-name">SwiftUI Expert</div>
        <div class="detail-source">${Icons.github} Anthropic Skills</div>
      </div>
      <button class="detail-close">${Icons.close}</button>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-title">Description</div>
        <div class="detail-desc">Write, review, or improve SwiftUI code following best practices for state management, view composition, performance, and iOS 26+ Liquid Glass adoption.</div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Tags</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <span class="tag tag-category">development</span>
          <span class="tag tag-category">swift</span>
          <span class="tag tag-category">swiftui</span>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Metadata</div>
        <div class="detail-meta-grid">
          <div class="detail-meta-item"><div class="detail-meta-label">Version</div><div class="detail-meta-value">1.3.0</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">References</div><div class="detail-meta-value">2 files</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">Scripts</div><div class="detail-meta-value">1 file</div></div>
          <div class="detail-meta-item"><div class="detail-meta-label">Source</div><div class="detail-meta-value" style="font-size:11px;">GitHub</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Providers</div>
        <div class="provider-cards">
          <div class="provider-card">
            <div class="provider-icon claude">C</div>
            <div class="provider-info"><div class="provider-name">Claude Code</div><div class="provider-path">~/.claude/skills/</div></div>
            <span class="link-status unlinked">Not linked</span>
          </div>
          <div class="provider-card">
            <div class="provider-icon codex">X</div>
            <div class="provider-info"><div class="provider-name">Codex</div><div class="provider-path">~/.codex/skills/</div></div>
            <span class="link-status unlinked">Not linked</span>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-footer">
      <button class="btn btn-primary" onclick="showInstallModal()">${dlSvg} Install &amp; Link</button>
    </div>
  </aside>`;

  document.getElementById('app-root').innerHTML = sidebar + main + detail;
  document.body.insertAdjacentHTML('beforeend', renderAddCatalogModal());
  document.body.insertAdjacentHTML('beforeend', renderInstallModal());
  document.body.insertAdjacentHTML('beforeend', renderPageNav('04-install'));
}

function card(name, desc, version, tags, selected) {
  var tagHtml = '';
  for (var i = 0; i < tags.length; i++) {
    tagHtml += '<span class="tag tag-category">' + tags[i] + '</span>';
  }
  return '<div class="skill-card' + (selected ? ' selected' : '') + '" onclick="selectCard(this)">' +
    '<div class="skill-card-header">' +
      '<div class="skill-card-name">' + name + '</div>' +
      '<div class="skill-card-actions"><button class="btn-icon" title="Install" onclick="event.stopPropagation();showInstallModal()">' + dlSvg + '</button></div>' +
    '</div>' +
    '<div class="skill-card-desc">' + desc + '</div>' +
    '<div class="skill-card-meta"><span class="tag tag-version">v' + version + '</span>' + tagHtml + '</div>' +
  '</div>';
}

function renderInstallModal() {
  return `
  <div class="modal-overlay hidden" id="modal-install" onclick="if(event.target===this)hideModal('modal-install')">
    <div class="modal install-modal" style="width:420px;">
      <div class="modal-header">
        <h2>Install SwiftUI Expert</h2>
        <p>Install to central storage and link to providers</p>
      </div>
      <div class="modal-body" id="install-body">
        <div class="install-path">
          <div class="install-path-label">Install to</div>
          <div class="install-path-value">~/.agent/skills/swiftui-expert/</div>
        </div>

        <div class="install-link-section">
          <div class="install-link-label">${linkSvg} Link to providers</div>
          <div class="provider-cards">
            <div class="provider-card checked" onclick="this.classList.toggle('checked')">
              <div class="provider-icon claude">C</div>
              <div class="provider-info">
                <div class="provider-name">Claude Code</div>
                <div class="provider-path">~/.claude/skills/swiftui-expert &rarr;</div>
              </div>
              <div class="checkbox">${checkSm}</div>
            </div>
            <div class="provider-card checked" onclick="this.classList.toggle('checked')">
              <div class="provider-icon codex">X</div>
              <div class="provider-info">
                <div class="provider-name">Codex</div>
                <div class="provider-path">~/.codex/skills/swiftui-expert &rarr;</div>
              </div>
              <div class="checkbox">${checkSm}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer" id="install-footer">
        <button class="btn btn-secondary" onclick="hideModal('modal-install')">Cancel</button>
        <button class="btn btn-primary" style="flex:none;" onclick="simulateInstall()">${dlSvg} Install &amp; Link</button>
      </div>
    </div>
  </div>`;
}

function showInstallModal() {
  // Reset state
  document.getElementById('install-body').innerHTML = `
    <div class="install-path">
      <div class="install-path-label">Install to</div>
      <div class="install-path-value">~/.agent/skills/swiftui-expert/</div>
    </div>
    <div class="install-link-section">
      <div class="install-link-label">${linkSvg} Link to providers</div>
      <div class="provider-cards">
        <div class="provider-card checked" onclick="this.classList.toggle('checked')">
          <div class="provider-icon claude">C</div>
          <div class="provider-info"><div class="provider-name">Claude Code</div><div class="provider-path">~/.claude/skills/swiftui-expert &rarr;</div></div>
          <div class="checkbox">${checkSm}</div>
        </div>
        <div class="provider-card checked" onclick="this.classList.toggle('checked')">
          <div class="provider-icon codex">X</div>
          <div class="provider-info"><div class="provider-name">Codex</div><div class="provider-path">~/.codex/skills/swiftui-expert &rarr;</div></div>
          <div class="checkbox">${checkSm}</div>
        </div>
      </div>
    </div>`;
  document.getElementById('install-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="hideModal('modal-install')">Cancel</button>
    <button class="btn btn-primary" style="flex:none;" onclick="simulateInstall()">${dlSvg} Install &amp; Link</button>`;
  document.getElementById('install-footer').style.display = '';
  showModal('modal-install');
}

function simulateInstall() {
  document.getElementById('install-body').innerHTML = `
    <div class="install-progress">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--text-secondary);">Installing to ~/.agent/skills/...</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Linking to Claude Code and Codex</div>
    </div>`;
  document.getElementById('install-footer').style.display = 'none';
  setTimeout(function() {
    document.getElementById('install-body').innerHTML = `
      <div class="install-success">
        <div class="check-circle">${Icons.check}</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">Installed &amp; Linked</div>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.6;">
          Stored in <code style="background:var(--bg-input);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:11px;">~/.agent/skills/swiftui-expert/</code><br>
          Linked to Claude Code and Codex
        </div>
      </div>`;
    document.getElementById('install-footer').innerHTML = `
      <button class="btn btn-primary" style="flex:none;" onclick="hideModal('modal-install')">Done</button>`;
    document.getElementById('install-footer').style.display = '';
  }, 1500);
}

renderPage();
</script>
</body>
</html>
