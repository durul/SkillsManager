# Implement Feature

Implement features using architecture-first design, TDD,
rich domain models, and Swift 6.2 patterns.

## Workflow Overview

\`\`\`
1. ARCHITECTURE DESIGN (User Approval)
2. TDD IMPLEMENTATION
   - Domain model tests → Domain models
   - Infrastructure tests → Implementations
   - Integration and views
\`\`\`

## Core Principles

### Rich Domain Models
Domain models encapsulate behavior, not just data:

\`\`\`swift
public struct Order: Sendable, Equatable {
    public let items: [OrderItem]
    public var totalAmount: Decimal {
        items.reduce(0) { $0 + $1.subtotal }
    }
    public var canBeCancelled: Bool {
        [.pending, .processing].contains(status)
    }
}
\`\`\`

### No ViewModel Layer
Views consume domain models directly:

\`\`\`swift
struct OrderRow: View {
    let order: Order
    var body: some View {
        HStack {
            Text(order.status.displayName)
            Spacer()
            Text(order.totalAmount, format: .currency(code: "USD"))
        }
    }
}
\`\`\`</textarea>
