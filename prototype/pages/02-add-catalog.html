<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillsManager — 2. Add Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/tokens.css">
<link rel="stylesheet" href="../components/layout.css">
<link rel="stylesheet" href="../components/buttons.css">
<link rel="stylesheet" href="../components/sidebar.css">
<link rel="stylesheet" href="../components/skill-card.css">
<link rel="stylesheet" href="../components/modal.css">
<style>
/* Step progress bar */
.step-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
}
.step-dot {
  width: 24px; height: 24px;
  min-width: 24px; min-height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  border: 2px solid var(--border);
  color: var(--text-muted);
}
.step-dot svg { width: 12px; height: 12px; }
.step-dot.done { background: var(--green); border-color: var(--green); color: white; }
.step-dot.active { background: var(--accent); border-color: var(--accent); color: white; }
.step-line { width: 40px; height: 2px; background: var(--border); }
.step-line.done { background: var(--green); }
.step-label { font-size: 12px; color: var(--text-muted); margin-right: 8px; }
.step-label.active { color: var(--text-primary); font-weight: 500; }

/* Success banner */
.success-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  background: var(--green-subtle);
  border-bottom: 1px solid rgba(34,197,94,0.2);
  font-size: 13px;
}
.success-banner .icon { color: var(--green); }
.success-banner .text { color: var(--green); font-weight: 500; }
.success-banner .right { margin-left: auto; font-size: 12px; color: var(--text-muted); }

/* Tags note */
.tags-note {
  padding: 10px 24px;
  font-size: 11px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="app" id="app-root"></div>

<script src="../components/icons.js"></script>
<script src="../components/app-shell.js"></script>
<script>
function renderPage() {
  // Sidebar with newly added catalog
  const sidebar = `
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Skills Manager
      </h1>
    </div>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Search skills..." />
    </div>
    <div class="source-sections">
      <div class="source-section">
        <div class="source-header"><span>Installed</span><span class="count">0</span></div>
        <div class="nav-item" onclick="setActiveNav(this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-7l-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/></svg>
          All Installed <span class="badge installed">0</span>
        </div>
      </div>
      <div class="source-section">
        <div class="source-header"><span>Catalogs</span><span class="count">1</span></div>
        <div class="nav-item active" onclick="setActiveNav(this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          Anthropic Skills <span class="badge">24</span>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-add-catalog" onclick="showModal('modal-add-catalog')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
        Add Catalog
      </button>
    </div>
  </aside>`;

  // Main content
  const checkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';
  const downloadSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  const refreshSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>';

  const main = `
  <main class="main">
    <div class="step-bar">
      <div class="step-dot done">${checkSvg}</div>
      <div class="step-label">Add URL</div>
      <div class="step-line done"></div>
      <div class="step-dot done">${checkSvg}</div>
      <div class="step-label">Clone</div>
      <div class="step-line done"></div>
      <div class="step-dot active">3</div>
      <div class="step-label active">Browse Skills</div>
    </div>

    <div class="success-banner">
      <span class="icon">${checkSvg}</span>
      <span class="text">Catalog added successfully</span>
      <span class="right">24 skills found in anthropics/skills</span>
    </div>

    <div class="topbar" style="border-top:none;">
      <div class="topbar-left">
        <div>
          <div class="topbar-title">Anthropic Skills</div>
          <div class="topbar-subtitle">24 skills &mdash; github.com/anthropics/skills</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" title="Refresh">${refreshSvg}</button>
      </div>
    </div>

    <div class="category-tabs">
      <div class="category-tab active" onclick="selectTab(this)">All <span style="color:var(--text-muted);font-size:10px;">24</span></div>
      <div class="category-tab" onclick="selectTab(this)">development <span style="color:var(--text-muted);font-size:10px;">8</span></div>
      <div class="category-tab" onclick="selectTab(this)">design <span style="color:var(--text-muted);font-size:10px;">5</span></div>
      <div class="category-tab" onclick="selectTab(this)">devops <span style="color:var(--text-muted);font-size:10px;">4</span></div>
      <div class="category-tab" onclick="selectTab(this)">documentation <span style="color:var(--text-muted);font-size:10px;">3</span></div>
      <div class="category-tab" onclick="selectTab(this)">testing <span style="color:var(--text-muted);font-size:10px;">2</span></div>
      <div class="category-tab" onclick="selectTab(this)">ai <span style="color:var(--text-muted);font-size:10px;">2</span></div>
    </div>

    <div class="tags-note">Tags auto-detected from SKILL.md frontmatter</div>

    <div class="content-area">
      <div class="skills-grid">
        ${card('Swift Concurrency', 'Expert guidance on async/await, actors, Sendable, and Swift 6 migration.', '2.1.0', ['development', 'swift'], downloadSvg)}
        ${card('UI/UX Pro Max', '50+ design styles, 97 color palettes, and UX guidelines.', '1.5.0', ['design', 'ui'], downloadSvg)}
        ${card('TDD Chicago School', 'State-based TDD with emergent design. Chicago School principles.', '1.0.0', ['testing', 'tdd'], downloadSvg)}
        ${card('Xcode Cloud CI/CD', 'Manage Xcode Cloud workflows, trigger builds, check status.', '1.2.0', ['devops', 'ci'], downloadSvg)}
        ${card('Feature Development', 'Guided feature dev with codebase understanding and code review.', '3.0.0', ['development'], downloadSvg)}
        ${card('App Store Changelog', 'Generate release notes from git history and tags automatically.', '1.0.0', ['documentation'], downloadSvg)}
        ${card('Claude API', 'Build apps with Claude API and Anthropic SDK. Tool use, agents.', '2.0.0', ['ai', 'api'], downloadSvg)}
        ${card('SwiftUI Expert', 'State management, view composition, iOS 26+ Liquid Glass.', '1.3.0', ['development', 'swift'], downloadSvg)}
      </div>
    </div>
  </main>`;

  document.getElementById('app-root').innerHTML = sidebar + main;
  document.body.insertAdjacentHTML('beforeend', renderAddCatalogModal());
  document.body.insertAdjacentHTML('beforeend', renderPageNav('02-add-catalog'));
}

function card(name, desc, version, tags, dlIcon) {
  var tagHtml = '';
  for (var i = 0; i < tags.length; i++) {
    tagHtml += '<span class="tag tag-category">' + tags[i] + '</span>';
  }
  return '<div class="skill-card" onclick="selectCard(this)">' +
    '<div class="skill-card-header">' +
      '<div class="skill-card-name">' + name + '</div>' +
      '<div class="skill-card-actions">' +
        '<button class="btn-icon" title="Install">' + dlIcon + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="skill-card-desc">' + desc + '</div>' +
    '<div class="skill-card-meta">' +
      '<span class="tag tag-version">v' + version + '</span>' +
      tagHtml +
    '</div>' +
  '</div>';
}

renderPage();
</script>
</body>
</html>
